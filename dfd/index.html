<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Filters</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"
    ></script>
  </head>
  <body>
    <main class="container" x-data="filterApp()">
      <h1>Filters</h1>

      <article x-show="error" style="border-color: var(--pico-del-color)">
        <span x-text="error"></span>
        <button class="secondary" @click="error = ''" style="float: right">
          Dismiss
        </button>
      </article>

      <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem">
        <input
          x-model="newRegexp"
          @keydown.enter="add()"
          placeholder="New regexp pattern"
          style="flex: 1; margin-bottom: 0"
        />
        <button @click="add()" :disabled="busy || !newRegexp.trim()">Add</button>
      </div>

      <p x-show="busy && filters.length === 0">Loading...</p>
      <p x-show="!busy && filters.length === 0">No filters configured.</p>

      <table x-show="filters.length > 0">
        <tbody>
          <template x-for="f in filters" :key="f.id">
            <tr>
              <td>
                <span x-show="editing !== f.id" x-text="f.regexp"></span>
                <input
                  x-show="editing === f.id"
                  x-model="editRegexp"
                  @keydown.enter="save(f.id)"
                  @keydown.escape="cancelEdit()"
                  style="width: 100%; margin-bottom: 0"
                />
              </td>
              <td style="width: 1%; white-space: nowrap">
                <button
                  x-show="editing !== f.id"
                  @click="startEdit(f)"
                  class="outline"
                  style="margin-bottom: 0"
                  :disabled="busy"
                >
                  Edit
                </button>
                <button
                  x-show="editing === f.id"
                  @click="save(f.id)"
                  style="margin-bottom: 0"
                  :disabled="busy || !editRegexp.trim()"
                >
                  Save
                </button>
                <button
                  x-show="editing === f.id"
                  @click="cancelEdit()"
                  class="outline"
                  style="margin-bottom: 0"
                  :disabled="busy"
                >
                  Cancel
                </button>
                <button
                  @click="remove(f.id)"
                  class="secondary"
                  style="margin-bottom: 0"
                  :disabled="busy"
                >
                  Delete
                </button>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </main>

    <script>
      function filterApp() {
        return {
          filters: [],
          newRegexp: "",
          editing: null,
          editRegexp: "",
          error: "",
          busy: false,

          async init() {
            await this.reload();
          },

          async request(path, options = {}) {
            const response = await fetch(path, options);
            if (!response.ok) {
              throw new Error(await this.describeError(response));
            }
            if (response.status === 204) return null;
            return await response.json();
          },

          async describeError(response) {
            if (response.status === 400) return "Invalid filter pattern.";
            if (response.status === 401) return "Authentication failed.";
            if (response.status === 404) return "Filter not found.";
            if (response.status === 409) return "Filter already exists.";
            return `Request failed: ${response.status}`;
          },

          async run(action) {
            this.error = "";
            this.busy = true;
            try {
              await action();
            } catch (e) {
              this.error = e.message || String(e);
            } finally {
              this.busy = false;
            }
          },

          async reload() {
            await this.run(async () => {
              this.filters = await this.request("/api/v1/filters");
            });
          },

          async add() {
            const regexp = this.newRegexp.trim();
            if (!regexp) return;
            await this.run(async () => {
              await this.request("/api/v1/filters", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ regexp }),
              });
              this.newRegexp = "";
              this.filters = await this.request("/api/v1/filters");
            });
          },

          startEdit(f) {
            this.editing = f.id;
            this.editRegexp = f.regexp;
          },

          cancelEdit() {
            this.editing = null;
            this.editRegexp = "";
          },

          async save(id) {
            const regexp = this.editRegexp.trim();
            if (!regexp) return;
            await this.run(async () => {
              await this.request(`/api/v1/filters/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ regexp }),
              });
              this.cancelEdit();
              this.filters = await this.request("/api/v1/filters");
            });
          },

          async remove(id) {
            await this.run(async () => {
              await this.request(`/api/v1/filters/${id}`, { method: "DELETE" });
              this.filters = await this.request("/api/v1/filters");
            });
          },
        };
      }
    </script>
  </body>
</html>
