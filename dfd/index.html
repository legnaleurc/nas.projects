<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Filters</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"
    ></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 1rem;
        line-height: 1.5;
        color: #111827;
        background: #f9fafb;
        margin: 0;
        padding: 0;
      }

      .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 2rem 1rem;
      }

      h1 { font-size: 1.875rem; font-weight: 700; margin: 0 0 1.5rem; }
      p { margin: 0 0 1rem; }

      article {
        padding: 1rem;
        border: 1px solid #d1d5db;
        border-radius: 0.5rem;
        margin-bottom: 1rem;
        background: #fff;
        overflow: hidden;
      }

      input {
        height: 2.5rem;
        padding: 0 0.75rem;
        border: 1px solid #d1d5db;
        border-radius: 0.375rem;
        font-size: 1rem;
        font-family: inherit;
        color: #111827;
        background: #fff;
        margin: 0;
        outline: none;
      }

      input:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgb(59 130 246 / 0.2);
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 2.5rem;
        padding: 0 1rem;
        border-radius: 0.375rem;
        border: 1px solid transparent;
        font-size: 1rem;
        font-family: inherit;
        font-weight: 500;
        cursor: pointer;
        margin: 0;
        background: #3b82f6;
        color: #fff;
      }

      button:hover:not(:disabled) { background: #2563eb; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }

      button.outline {
        background: transparent;
        border-color: #d1d5db;
        color: #374151;
      }
      button.outline:hover:not(:disabled) { background: #f3f4f6; }

      button.secondary {
        background: transparent;
        color: #6b7280;
      }
      button.secondary:hover:not(:disabled) { background: #f3f4f6; }

      .icon-button { padding: 0; width: 2.5rem; }

      .material-symbols-outlined {
        font-family: "Material Symbols Outlined";
        font-weight: normal;
        font-style: normal;
        font-size: 1.25rem;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-feature-settings: "liga";
        -webkit-font-smoothing: antialiased;
      }
    </style>
  </head>
  <body>
    <main class="container" x-data="filterApp()">
      <h1>Filters</h1>

      <article x-show="error" style="border-color: #ef4444">
        <span x-text="error"></span>
        <button
          class="secondary icon-button"
          @click="error = ''"
          style="float: right"
          aria-label="Dismiss"
          title="Dismiss"
        >
          <span class="material-symbols-outlined" aria-hidden="true">close</span>
        </button>
      </article>

      <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem">
        <input
          x-model="newRegexp"
          @keydown.enter="add()"
          placeholder="New regexp pattern"
          style="flex: 1"
        />
        <button
          class="icon-button"
          @click="add()"
          :disabled="busy || !newRegexp.trim()"
          aria-label="Add"
          title="Add"
        >
          <span class="material-symbols-outlined" aria-hidden="true">add</span>
        </button>
      </div>

      <p x-show="busy && filters.length === 0">Loading...</p>
      <p x-show="!busy && filters.length === 0">No filters configured.</p>

      <div x-show="filters.length > 0">
        <template x-for="f in filters" :key="f.id">
          <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem">
            <div style="flex: 1; min-width: 0">
              <span x-show="editing !== f.id" x-text="f.regexp"></span>
              <input
                x-show="editing === f.id"
                x-model="editRegexp"
                @keydown.enter="save(f.id)"
                @keydown.escape="cancelEdit()"
                style="width: 100%"
              />
            </div>
            <div style="display: flex; gap: 0.25rem; flex-shrink: 0">
              <button
                x-show="editing !== f.id"
                @click="startEdit(f)"
                class="outline icon-button"
                :disabled="busy"
                aria-label="Edit"
                title="Edit"
              >
                <span class="material-symbols-outlined" aria-hidden="true">edit</span>
              </button>
              <button
                x-show="editing === f.id"
                @click="save(f.id)"
                class="icon-button"
                :disabled="busy || !editRegexp.trim()"
                aria-label="Save"
                title="Save"
              >
                <span class="material-symbols-outlined" aria-hidden="true">save</span>
              </button>
              <button
                x-show="editing === f.id"
                @click="cancelEdit()"
                class="outline icon-button"
                :disabled="busy"
                aria-label="Cancel"
                title="Cancel"
              >
                <span class="material-symbols-outlined" aria-hidden="true">close</span>
              </button>
              <button
                x-show="editing !== f.id"
                @click="remove(f.id)"
                class="secondary icon-button"
                :disabled="busy"
                aria-label="Delete"
                title="Delete"
              >
                <span class="material-symbols-outlined" aria-hidden="true">delete</span>
              </button>
            </div>
          </div>
        </template>
      </div>
    </main>

    <script>
      function filterApp() {
        return {
          filters: [],
          newRegexp: "",
          editing: null,
          editRegexp: "",
          error: "",
          busy: false,

          async init() {
            await this.reload();
          },

          async request(path, options = {}) {
            const response = await fetch(path, options);
            if (!response.ok) {
              throw new Error(await this.describeError(response));
            }
            if (response.status === 204) return null;
            return await response.json();
          },

          async describeError(response) {
            if (response.status === 400) return "Invalid filter pattern.";
            if (response.status === 401) return "Authentication failed.";
            if (response.status === 404) return "Filter not found.";
            if (response.status === 409) return "Filter already exists.";
            return `Request failed: ${response.status}`;
          },

          async run(action) {
            this.error = "";
            this.busy = true;
            try {
              await action();
            } catch (e) {
              this.error = e.message || String(e);
            } finally {
              this.busy = false;
            }
          },

          async reload() {
            await this.run(async () => {
              this.filters = await this.request("/api/v1/filters");
            });
          },

          async add() {
            const regexp = this.newRegexp.trim();
            if (!regexp) return;
            await this.run(async () => {
              await this.request("/api/v1/filters", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ regexp }),
              });
              this.newRegexp = "";
              this.filters = await this.request("/api/v1/filters");
            });
          },

          startEdit(f) {
            this.editing = f.id;
            this.editRegexp = f.regexp;
          },

          cancelEdit() {
            this.editing = null;
            this.editRegexp = "";
          },

          async save(id) {
            const regexp = this.editRegexp.trim();
            if (!regexp) return;
            await this.run(async () => {
              await this.request(`/api/v1/filters/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ regexp }),
              });
              this.cancelEdit();
              this.filters = await this.request("/api/v1/filters");
            });
          },

          async remove(id) {
            await this.run(async () => {
              await this.request(`/api/v1/filters/${id}`, { method: "DELETE" });
              this.filters = await this.request("/api/v1/filters");
            });
          },
        };
      }
    </script>
  </body>
</html>
