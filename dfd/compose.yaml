services:
  dfd:
    container_name: dfd
    image: docker.io/library/nginx:alpine
    ports:
      - "${DFD_HOST}:${DFD_PORT}:80"
    environment:
      DULD_API_URL: "${DULD_API_URL}"
      DULD_API_AUTHORIZATION: "${DULD_API_AUTHORIZATION}"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    restart: on-failure
